name: CI

on:
  pull_request:
    branches: [main, prod]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  # ── Fast checks (seconds) ──────────────────────────────────────────────
  format:
    name: Formatting
    runs-on: macos-15
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  lint:
    name: Clippy
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: clippy
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-
      # objc/cocoa crates emit ~30 `unexpected_cfg` warnings — upstream noise.
      - run: cargo clippy --workspace --locked -- -D warnings -A unexpected_cfgs

  # ── Commit message lint ────────────────────────────────────────────────
  commits:
    name: Commit Messages
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Validate conventional commits
        run: |
          ERRORS=0
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          while IFS= read -r line; do
            hash="${line%% *}"
            msg="${line#* }"

            # Must match: type: description  or  type(scope): description
            if ! echo "$msg" | grep -qE '^(feat|fix|refactor|perf|test|docs|chore|ci|style|build|revert)(\(.+\))?!?: .+'; then
              echo "::error::Bad commit message: $msg ($hash)"
              echo "  Expected format: <type>: <description>"
              echo "  Types: feat, fix, refactor, perf, test, docs, chore, ci, style, build, revert"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(git log --oneline --no-merges "${BASE}..${HEAD}")

          if [[ $ERRORS -gt 0 ]]; then
            echo ""
            echo "::error::$ERRORS commit(s) do not follow conventional commit format"
            exit 1
          fi
          echo "All commits follow conventional commit format"

  # ── Tests (parallel with lint) ─────────────────────────────────────────
  test:
    name: Tests
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-test-
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          cargo test --workspace --locked 2>&1 | tee /tmp/test-output.txt
      - name: Summarize results
        if: always()
        run: |
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          grep '^test result:' /tmp/test-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "No results found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          PASSED=$(grep -oE '[0-9]+ passed' /tmp/test-output.txt | awk '{s+=$1} END {print s+0}')
          FAILED=$(grep -oE '[0-9]+ failed' /tmp/test-output.txt | awk '{s+=$1} END {print s+0}')
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total: ${PASSED} passed, ${FAILED} failed**" >> "$GITHUB_STEP_SUMMARY"

  # ── Code coverage ──────────────────────────────────────────────────────
  coverage:
    name: Code Coverage
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: llvm-tools-preview
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            ~/.cargo/bin/cargo-llvm-cov
            target/
          key: ${{ runner.os }}-cov-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cov-
      - name: Install cargo-llvm-cov
        run: command -v cargo-llvm-cov || cargo install cargo-llvm-cov --locked
      - name: Generate coverage
        run: |
          cargo llvm-cov --workspace --lcov --output-path lcov.info 2>&1 | tee /tmp/cov-output.txt
      - name: Coverage summary
        if: always()
        run: |
          cargo llvm-cov report --workspace 2>&1 | tee /tmp/cov-report.txt
          echo "## Code Coverage" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/cov-report.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── Docker build verification ───────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        include:
          - name: proxy
            context: .
            dockerfile: crates/aura-proxy/Dockerfile
          - name: memory-agent
            context: infrastructure/memory-agent/
            dockerfile: infrastructure/memory-agent/Dockerfile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Build ${{ matrix.name }} Docker image
        run: docker build -f "${{ matrix.dockerfile }}" "${{ matrix.context }}"

  # ── Build verification ─────────────────────────────────────────────────
  build:
    name: Build
    runs-on: macos-15
    timeout-minutes: 30
    needs: [format, lint]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Build release binary
        run: cargo build --release --locked -p aura-daemon
      - name: Bundle Aura.app
        run: bash scripts/bundle.sh
      - name: Verify binary
        run: |
          # Ensure the binary exists and is a valid Mach-O executable
          file target/release/aura-daemon | grep -q "Mach-O"
          echo "Binary: $(du -h target/release/aura-daemon | cut -f1)"

          # Ensure the app bundle is valid
          test -f target/release/Aura.app/Contents/MacOS/aura-daemon
          echo "App bundle: $(du -sh target/release/Aura.app | cut -f1)"
      - name: Summarize build
        run: |
          echo "## Build Artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Artifact | Size |" >> "$GITHUB_STEP_SUMMARY"
          echo "|----------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| aura-daemon | $(du -h target/release/aura-daemon | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Aura.app | $(du -sh target/release/Aura.app | cut -f1) |" >> "$GITHUB_STEP_SUMMARY"

  # ── Security audit ─────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-v1
      - name: Install cargo-audit
        run: command -v cargo-audit || cargo install cargo-audit --locked
      - name: Audit dependencies
        shell: bash
        run: |
          set -o pipefail
          cargo audit 2>&1 | tee /tmp/audit-output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          echo "## Security Audit" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/audit-output.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

          exit $EXIT_CODE

  # ── Python formatting (seconds) ───────────────────────────────────────
  python-format:
    name: Python Formatting
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@b75dde52aef63a238519e7aecbbe79a4a52e4315 # v7
        with:
          version: "0.10.9"
      - name: Check formatting
        run: uvx ruff format --check infrastructure/memory-agent/

  # ── Python linting ──────────────────────────────────────────────────
  python-lint:
    name: Python Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@b75dde52aef63a238519e7aecbbe79a4a52e4315 # v7
        with:
          version: "0.10.9"
      - name: Lint
        run: uvx ruff check infrastructure/memory-agent/

  # ── Python tests ────────────────────────────────────────────────────
  python-test:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@b75dde52aef63a238519e7aecbbe79a4a52e4315 # v7
        with:
          version: "0.10.9"
      - uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: uv pip install --system -r infrastructure/memory-agent/requirements-dev.txt
      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          cd infrastructure/memory-agent && python -m pytest tests/ -v 2>&1 | tee /tmp/py-test-output.txt
      - name: Summarize results
        if: always()
        run: |
          echo "## Python Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -5 /tmp/py-test-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "No results found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  # ── PR size warning ────────────────────────────────────────────────────
  pr-size:
    name: PR Size
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"

          ADDITIONS=$(git diff --numstat "${BASE}..${HEAD}" -- '*.rs' '*.toml' '*.yml' '*.yaml' '*.sh' '*.swift' '*.py' | awk '{s+=$1} END {print s+0}')
          DELETIONS=$(git diff --numstat "${BASE}..${HEAD}" -- '*.rs' '*.toml' '*.yml' '*.yaml' '*.sh' '*.swift' '*.py' | awk '{s+=$2} END {print s+0}')
          TOTAL=$((ADDITIONS + DELETIONS))
          FILES=$(git diff --name-only "${BASE}..${HEAD}" | wc -l | tr -d ' ')

          if [[ $TOTAL -gt 1000 ]]; then
            SIZE="XL"
            LABEL="Consider splitting this PR into smaller, focused changes."
          elif [[ $TOTAL -gt 500 ]]; then
            SIZE="L"
            LABEL="Large PR — review may take longer."
          elif [[ $TOTAL -gt 200 ]]; then
            SIZE="M"
            LABEL=""
          else
            SIZE="S"
            LABEL=""
          fi

          echo "## PR Size: **${SIZE}**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Count |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files changed | ${FILES} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lines changed | +${ADDITIONS} / -${DELETIONS} |" >> "$GITHUB_STEP_SUMMARY"
          if [[ -n "$LABEL" ]]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> ${LABEL}" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ── Gate — all required checks must pass ───────────────────────────────
  gate:
    name: Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [format, lint, test, build, audit, coverage, docker, commits, python-format, python-lint, python-test]
    steps:
      - name: Check required jobs
        run: |
          echo "=== Rust ==="
          echo "format:        ${{ needs.format.result }}"
          echo "lint:          ${{ needs.lint.result }}"
          echo "test:          ${{ needs.test.result }}"
          echo "build:         ${{ needs.build.result }}"
          echo "audit:         ${{ needs.audit.result }}"
          echo "coverage:      ${{ needs.coverage.result }}"
          echo ""
          echo "=== Python ==="
          echo "python-format: ${{ needs.python-format.result }}"
          echo "python-lint:   ${{ needs.python-lint.result }}"
          echo "python-test:   ${{ needs.python-test.result }}"
          echo ""
          echo "=== Shared ==="
          echo "docker:        ${{ needs.docker.result }}"
          echo "commits:       ${{ needs.commits.result }}"

          # commits is skipped on push (only runs on PRs) — that's OK.
          if [[ "${{ needs.format.result }}" != "success" ]] || \
             [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.audit.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]] || \
             [[ "${{ needs.docker.result }}" != "success" ]] || \
             [[ "${{ needs.python-format.result }}" != "success" ]] || \
             [[ "${{ needs.python-lint.result }}" != "success" ]] || \
             [[ "${{ needs.python-test.result }}" != "success" ]]; then
            echo "::error::One or more required checks failed"
            exit 1
          fi
          COMMITS="${{ needs.commits.result }}"
          if [[ "$COMMITS" != "success" && "$COMMITS" != "skipped" ]]; then
            echo "::error::Commit message validation failed"
            exit 1
          fi
          echo "All checks passed"
