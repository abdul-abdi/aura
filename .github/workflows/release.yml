name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "release" to confirm'
        required: true
        type: string

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    timeout-minutes: 45
    if: github.event_name == 'push' || github.event.inputs.confirm == 'release'

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Triggered by tag push — extract version from tag
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Triggered manually — read version from Cargo.toml
            VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' Cargo.toml | head -1)
          fi
          if [[ -z "$VERSION" ]]; then
            echo "::error::Could not determine version"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "### Release v${VERSION}" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify Cargo.toml matches version
        run: |
          CARGO_VERSION=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' Cargo.toml | head -1)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [[ "$CARGO_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match release version (v$TAG_VERSION). Update Cargo.toml first."
            exit 1
          fi

      - name: Check tag does not already exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git tag -l "v${VERSION}" | grep -q .; then
            echo "::error::Tag v${VERSION} already exists. Bump the version in Cargo.toml."
            exit 1
          fi

      - name: Create and push tag
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Cache Cargo registry and target
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      # objc/cocoa crates emit ~30 `unexpected_cfg` warnings on every build —
      # these are upstream noise. Allow that lint so clippy exits cleanly.
      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings -A unexpected_cfgs

      - name: Test
        run: cargo test --workspace --locked

      - name: Build Rust daemon (release)
        env:
          AURA_PROD_PROXY_URL: ${{ secrets.AURA_PROD_PROXY_URL }}
          AURA_PROD_CLOUD_RUN_URL: ${{ secrets.AURA_PROD_CLOUD_RUN_URL }}
        run: cargo build --release --locked -p aura-daemon

      - name: Bundle Aura.app
        run: bash scripts/bundle.sh --strict

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_DIR=$(mktemp -d)
          trap 'rm -rf "$DMG_DIR"' EXIT
          cp -r target/release/Aura.app "$DMG_DIR/Aura.app"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create \
            -volname "Aura" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "target/release/Aura-${VERSION}.dmg"

      - name: Fetch tags for release notes
        run: git fetch --tags

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(bash scripts/generate-release-notes.sh)
          # Write to file to avoid shell escaping issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Aura v${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md
          files: target/release/Aura-${{ steps.version.outputs.version }}.dmg

      # After GitHub Release creation, trigger cloud deploy to production
      - name: Deploy cloud services
        if: success()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-cloud.yml',
              ref: 'prod',
              inputs: {
                service: 'all',
                environment: 'production'
              }
            });
