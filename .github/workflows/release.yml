name: Release

on:
  push:
    branches:
      - prod

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all --check

      # objc/cocoa crates emit ~30 `unexpected_cfg` warnings on every build —
      # these are upstream noise. Allow that lint so clippy exits cleanly.
      - name: Clippy
        run: cargo clippy --workspace -- -D warnings -A unexpected_cfgs

      - name: Test
        run: cargo test --workspace

      - name: Build Rust daemon (release)
        run: cargo build --release -p aura-daemon

      - name: Bundle Aura.app
        run: bash scripts/bundle.sh --strict

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_DIR=$(mktemp -d)
          cp -r target/release/Aura.app "$DMG_DIR/Aura.app"
          ln -s /Applications "$DMG_DIR/Applications"
          hdiutil create \
            -volname "Aura" \
            -srcfolder "$DMG_DIR" \
            -ov \
            -format UDZO \
            "target/release/Aura-${VERSION}.dmg"
          rm -rf "$DMG_DIR"

      - name: Fetch tags for release notes
        run: git fetch --tags

      - name: Generate release notes
        id: notes
        run: |
          NOTES=$(bash scripts/generate-release-notes.sh)
          # Write to file to avoid shell escaping issues
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Aura v${{ steps.version.outputs.version }}
          body_path: /tmp/release-notes.md
          files: target/release/Aura-${{ steps.version.outputs.version }}.dmg

      # After GitHub Release creation, trigger cloud deploy
      - name: Deploy cloud services
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-cloud.yml',
              ref: 'prod',
              inputs: {
                service: 'all',
                environment: 'production'
              }
            });
