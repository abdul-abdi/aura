name: Deploy Cloud Services

on:
  push:
    branches: [main, prod]
    paths:
      - 'infrastructure/**'
      - 'crates/aura-proxy/**'
      - '.github/workflows/deploy-cloud.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - proxy
          - consolidation
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  ENV_SUFFIX: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/prod') && 'prod' || 'staging' }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-progress deployments

permissions:
  contents: read
  id-token: write  # For Workload Identity Federation

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      proxy: ${{ steps.changes.outputs.proxy }}
      consolidation: ${{ steps.changes.outputs.consolidation }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: changes
        run: |
          # For push events, github.event.before gives the previous HEAD — covers
          # multi-commit pushes (HEAD~1 would miss changes in earlier commits).
          # Falls back to HEAD~1 for workflow_dispatch or missing before SHA.
          BEFORE="${{ github.event.before }}"
          if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
            BASE="$BEFORE"
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [[ -z "$BASE" ]]; then
            echo "proxy=true" >> "$GITHUB_OUTPUT"
            echo "consolidation=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          if echo "$CHANGED" | grep -q 'crates/aura-proxy/'; then
            echo "proxy=true" >> "$GITHUB_OUTPUT"
          else
            echo "proxy=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q 'infrastructure/'; then
            echo "consolidation=true" >> "$GITHUB_OUTPUT"
          else
            echo "consolidation=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-proxy:
    name: Deploy Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, deploy-consolidation]
    if: |
      always() &&
      (needs.detect-changes.outputs.proxy == 'true' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'proxy') &&
      needs.detect-changes.result == 'success'
    environment:
      name: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/prod') && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy aura-proxy-${{ env.ENV_SUFFIX }} \
            --source . \
            --dockerfile crates/aura-proxy/Dockerfile \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 3600 \
            --set-secrets="AURA_PROXY_AUTH_TOKEN=aura-proxy-auth-token:latest" \
            --quiet

      - name: Health check
        run: |
          URL=$(gcloud run services describe aura-proxy-${{ env.ENV_SUFFIX }} \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format "value(status.url)")
          for i in $(seq 1 10); do
            if curl -sf "${URL}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts!" && exit 1

  deploy-consolidation:
    name: Deploy Consolidation
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.consolidation == 'true' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'consolidation'
    environment:
      name: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/prod') && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy aura-consolidation-${{ env.ENV_SUFFIX }} \
            --source infrastructure/ \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --set-secrets="GEMINI_API_KEY=gemini-api-key:latest,AURA_AUTH_TOKEN=aura-consolidation-auth-token:latest" \
            --set-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 3 \
            --quiet

      - name: Health check
        run: |
          URL=$(gcloud run services describe aura-consolidation-${{ env.ENV_SUFFIX }} \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format "value(status.url)")
          for i in $(seq 1 10); do
            if curl -sf "${URL}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts!" && exit 1
