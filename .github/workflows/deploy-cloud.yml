name: Deploy Cloud Services

on:
  push:
    branches: [main, prod]
    paths:
      - 'infrastructure/memory-agent/**'
      - 'crates/aura-proxy/**'
      - '.github/workflows/deploy-cloud.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy'
        required: true
        type: choice
        options:
          - all
          - proxy
          - memory_agent
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  ENV_SUFFIX: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/prod') && 'prod' || 'staging' }}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false  # Never cancel in-progress deployments

permissions:
  contents: read
  id-token: write  # For Workload Identity Federation

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      proxy: ${{ steps.changes.outputs.proxy }}
      memory_agent: ${{ steps.changes.outputs.memory_agent }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - id: changes
        run: |
          # For push events, github.event.before gives the previous HEAD — covers
          # multi-commit pushes (HEAD~1 would miss changes in earlier commits).
          # Falls back to HEAD~1 for workflow_dispatch or missing before SHA.
          BEFORE="${{ github.event.before }}"
          if [[ -n "$BEFORE" && "$BEFORE" != "0000000000000000000000000000000000000000" ]]; then
            BASE="$BEFORE"
          else
            BASE=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi
          if [[ -z "$BASE" ]]; then
            echo "proxy=true" >> "$GITHUB_OUTPUT"
            echo "memory_agent=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          CHANGED=$(git diff --name-only "$BASE" HEAD)
          if echo "$CHANGED" | grep -q 'crates/aura-proxy/'; then
            echo "proxy=true" >> "$GITHUB_OUTPUT"
          else
            echo "proxy=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q 'infrastructure/memory-agent/'; then
            echo "memory_agent=true" >> "$GITHUB_OUTPUT"
          else
            echo "memory_agent=false" >> "$GITHUB_OUTPUT"
          fi

  deploy-proxy:
    name: Deploy Proxy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, deploy-memory-agent]
    if: |
      always() &&
      (needs.detect-changes.outputs.proxy == 'true' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'proxy') &&
      needs.detect-changes.result == 'success'
    environment:
      name: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/prod') && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Deploy to Cloud Run
        run: |
          # gcloud run deploy --source expects Dockerfile at source root.
          # Proxy Dockerfile lives in crates/aura-proxy/ but needs the full
          # workspace as build context, so copy it to root for the deploy.
          cp crates/aura-proxy/Dockerfile Dockerfile
          gcloud run deploy aura-proxy-${{ env.ENV_SUFFIX }} \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --allow-unauthenticated \
            --port 8080 \
            --memory 256Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 3600 \
            --set-secrets="AURA_PROXY_AUTH_TOKEN=aura-proxy-auth-token:latest" \
            --quiet

      - name: Health check
        run: |
          URL=$(gcloud run services describe aura-proxy-${{ env.ENV_SUFFIX }} \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format "value(status.url)")
          for i in $(seq 1 10); do
            if curl -sf "${URL}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts!" && exit 1

  deploy-memory-agent:
    name: Deploy Memory Agent
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: detect-changes
    if: |
      needs.detect-changes.outputs.memory_agent == 'true' ||
      github.event.inputs.service == 'all' ||
      github.event.inputs.service == 'memory_agent'
    environment:
      name: ${{ (github.event.inputs.environment == 'production' || github.ref == 'refs/heads/prod') && 'production' || 'staging' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy aura-memory-agent-${{ env.ENV_SUFFIX }} \
            --source infrastructure/memory-agent/ \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --no-allow-unauthenticated \
            --set-secrets="GEMINI_API_KEY=gemini-api-key:latest,AURA_AUTH_TOKEN=aura-consolidation-auth-token:latest" \
            --set-env-vars="GCP_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}" \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 5 \
            --quiet

      - name: Health check
        run: |
          URL=$(gcloud run services describe aura-memory-agent-${{ env.ENV_SUFFIX }} \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "${{ vars.GCP_REGION }}" \
            --format "value(status.url)")
          for i in $(seq 1 10); do
            if curl -sf "${URL}/health"; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i/10 failed, retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 10 attempts!" && exit 1
